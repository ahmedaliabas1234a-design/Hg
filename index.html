<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مولد الحسابات الاحترافي</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #007bff; border: none; color: white; border-radius: 10px; }
        #result { margin-top: 30px; font-size: 18px; border: 1px solid #333; padding: 20px; display: inline-block; }
    </style>
</head>
<body>
    <h1>مولد الإيميلات الوهمية</h1>
    <button onclick="generate()">توليد حساب جديد</button>
    <div id="result">اضغط الزر للبدء</div>

    <script>
        function generate() {
            const domains = ["gmail.com", "hotmail.com", "outlook.com"];
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
            let user = "";
            for(let i=0; i<10; i++) user += chars.charAt(Math.floor(Math.random() * chars.length));
            let email = user + "@" + domains[Math.floor(Math.random() * domains.length)];
            let pass = Math.random().toString(36).substring(2, 14);
            document.getElementById("result").innerHTML = "<b>الإيميل:</b> " + email + "<br><b>كلمة المرور:</b> " + pass;
        }
    </script>
</body>
</html>
